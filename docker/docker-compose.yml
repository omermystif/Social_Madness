services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: command-dashboard-pocketbase
    restart: unless-stopped
    command: serve --http=0.0.0.0:8090
    env_file:
      - .env
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
      - ../scripts:/app/scripts:ro
      - ./backups:/backup

  caddy:
    image: caddy:alpine
    container_name: command-dashboard-caddy
    restart: unless-stopped
    depends_on:
      - pocketbase
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pb_data:
  caddy_data:
  caddy_config:
