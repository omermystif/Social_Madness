name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ENABLE_CLOUD_SYNC: 'false'

      - name: Security scan
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Check for secrets in source
        run: |
          # Fail if any real credentials leaked into src/
          if grep -r "AIza\|ya29\.\|AAAA[A-Za-z0-9]" src/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "node_modules"; then
            echo "❌ Possible API key found in source files!"
            exit 1
          fi
          echo "✅ No credential leaks detected"

# Note: Vercel deploys are handled by Vercel's native GitHub integration
# (auto-deploys on push to main). No CI-side deploy job needed.
