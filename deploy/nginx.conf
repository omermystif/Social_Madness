# /etc/nginx/sites-available/command-dashboard
# Reverse proxy for the SPA + API. Symlink into sites-enabled and reload nginx.
#
# Replace {{DOMAIN}} with your domain before installing (or use envsubst /
# the install snippet in docs/oracle-cloud-deployment.md).

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name {{DOMAIN}} www.{{DOMAIN}};

    # ACME challenge directory for certbot --webroot.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://{{DOMAIN}}$request_uri;
    }
}

# ── HTTPS canonical ──────────────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name {{DOMAIN}};

    ssl_certificate     /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers — CSP allowlist mirrors the Vercel/Netlify configs.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), accelerometer=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://rsms.me; font-src 'self' data: https://rsms.me; img-src 'self' data: blob: https://*.googleusercontent.com https://lh3.googleusercontent.com; connect-src 'self' https://oauth2.googleapis.com https://www.googleapis.com https://accounts.google.com; frame-src https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # Gzip dynamic + cacheable bundles.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;
    gzip_vary       on;

    client_max_body_size 2m;

    # ── API: reverse proxy to the Node.js backend ───────────────────────
    location /api/ {
        proxy_pass             http://127.0.0.1:3000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;
        proxy_connect_timeout  5s;
        proxy_buffering        off;
    }

    # ── SPA assets (hashed) — long-lived cache ──────────────────────────
    location /assets/ {
        root /var/www/command-dashboard;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────
    location / {
        root /var/www/command-dashboard;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Hide nginx version
    server_tokens off;
}
